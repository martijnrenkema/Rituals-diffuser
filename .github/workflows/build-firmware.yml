name: Build Firmware

on:
  push:
    branches: [ main, claude/* ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install PlatformIO Core
      run: |
        pip install --upgrade platformio
        pio --version

    - name: Build firmware
      run: |
        echo "Building firmware for ESP8266..."
        pio run -e esp8266 -v
        echo "Build completed successfully!"

    - name: Check build output
      run: |
        echo "Checking for firmware.bin..."
        ls -lah .pio/build/esp8266/
        if [ ! -f .pio/build/esp8266/firmware.bin ]; then
          echo "ERROR: firmware.bin not found!"
          exit 1
        fi

    - name: Prepare artifacts
      run: |
        mkdir -p artifacts
        cp .pio/build/esp8266/firmware.bin artifacts/rituals-diffuser-v1.3.0-esp8266.bin
        echo "Artifact prepared:"
        ls -lah artifacts/

    - name: Upload firmware artifact
      uses: actions/upload-artifact@v3
      with:
        name: firmware-esp8266-v1.3.0
        path: artifacts/*.bin
        retention-days: 30

    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/*.bin
        body: |
          ## Rituals Diffuser Firmware ${{ github.ref_name }}

          ### Installation

          **Web OTA (if already running custom firmware)**
          1. Download `rituals-diffuser-v1.3.0-esp8266.bin`
          2. Go to http://rituals-diffuser.local/
          3. Upload via web interface

          **Serial Flash (first time)**
          ```bash
          esptool.py --port /dev/cu.usbserial-XXXX write_flash 0x00000 rituals-diffuser-v1.3.0-esp8266.bin
          ```

          ### What's New
          See [CHANGELOG](https://github.com/martijnrenkema/Rituals-diffuser#changelog)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
