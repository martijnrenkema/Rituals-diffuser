name: Build Firmware

on:
  push:
    branches: [ main, claude/* ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install PlatformIO Core
      run: |
        pip install --upgrade platformio
        pio --version

    - name: Build firmware (ESP8266)
      run: |
        echo "Building firmware for ESP8266..."
        pio run -e esp8266 -v
        echo "ESP8266 build completed!"

    - name: Build firmware (ESP32)
      run: |
        echo "Building firmware for ESP32..."
        pio run -e esp32 -v
        echo "ESP32 build completed!"

    - name: Check build outputs
      run: |
        echo "Checking ESP8266 firmware..."
        ls -lah .pio/build/esp8266/
        if [ ! -f .pio/build/esp8266/firmware.bin ]; then
          echo "ERROR: ESP8266 firmware.bin not found!"
          exit 1
        fi
        echo "Checking ESP32 firmware..."
        ls -lah .pio/build/esp32/
        if [ ! -f .pio/build/esp32/firmware.bin ]; then
          echo "ERROR: ESP32 firmware.bin not found!"
          exit 1
        fi
        echo "Both builds successful!"

    - name: Prepare artifacts
      run: |
        mkdir -p artifacts
        cp .pio/build/esp8266/firmware.bin artifacts/rituals-diffuser-v1.3.0-esp8266.bin
        cp .pio/build/esp32/firmware.bin artifacts/rituals-diffuser-v1.3.0-esp32.bin
        echo "Artifacts prepared:"
        ls -lah artifacts/

    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-v1.3.0
        path: artifacts/*.bin
        retention-days: 30

    - name: Create Release (on tag)
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: artifacts/*.bin
        body: |
          ## Rituals Diffuser Firmware ${{ github.ref_name }}

          ### Platform Support

          ✅ **ESP8266** - Original Rituals Perfume Genie 2.0 hardware
          ✅ **ESP32** - Custom builds and newer hardware

          ### Installation

          **Web OTA (if already running custom firmware)**
          1. Download the correct .bin for your platform:
             - ESP8266: `rituals-diffuser-v1.3.0-esp8266.bin`
             - ESP32: `rituals-diffuser-v1.3.0-esp32.bin`
          2. Go to http://rituals-diffuser.local/
          3. Upload via web interface

          **Serial Flash (first time)**

          ESP8266:
          ```bash
          esptool.py --port /dev/cu.usbserial-XXXX write_flash 0x00000 rituals-diffuser-v1.3.0-esp8266.bin
          ```

          ESP32:
          ```bash
          esptool.py --port /dev/cu.usbserial-XXXX write_flash 0x1000 rituals-diffuser-v1.3.0-esp32.bin
          ```

          ### What's New
          See [CHANGELOG](https://github.com/martijnrenkema/Rituals-diffuser#changelog)
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
